<!DOCTYPE html>
<html>
<head><title>Messenger Test</title></head>
<body>
  <h2>Чат</h2>
  <input id="chatId" placeholder="ID чата" value="test">
  <input id="senderId" placeholder="ID отправителя" value="1">
  <br><br>
  <input id="text" placeholder="Сообщение">
  <button onclick="send()">Отправить текст</button>
  <br><br>
  <input type="file" id="file">
  <button onclick="upload()">Отправить файл</button>
  <br><br>
  <button onclick="loadHistory()">Загрузить историю</button>
  <div id="messages"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const chatId = () => document.getElementById('chatId').value;
    
    socket.emit('join_chat', chatId());
    
    socket.on('new_message', (msg) => {
      const div = document.getElementById('messages');
      const p = document.createElement('p');
      p.textContent = `[${msg.sender_id}] ${msg.text || ''} ${msg.file_url || ''}`;
      div.prepend(p);
    });

    async function send() {
      socket.emit('send_message', { chatId: chatId(), senderId: +document.getElementById('senderId').value, text: document.getElementById('text').value });
    }

    async function upload() {
      const file = document.getElementById('file').files[0];
      const form = new FormData();
      form.append('file', file);
      form.append('chatId', chatId());
      form.append('senderId', document.getElementById('senderId').value);
      await fetch('/api/upload', { method: 'POST', body: form });
    }

    async function loadHistory() {
      const res = await fetch('/api/messages/' + chatId());
      const msgs = await res.json();
      document.getElementById('messages').innerHTML = msgs.map(m => `<p>[${m.sender_id}] ${m.text || ''} ${m.file_url || ''}</p>`).join('');
    }
  </script>
</body>
</html>
