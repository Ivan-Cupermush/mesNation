<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>mesNation Chat MVP</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        #messages { border:1px solid #ccc; height:300px; overflow-y:scroll; margin-bottom:10px; padding:5px; }
        .msg { margin:5px 0; } .msg span { font-weight:bold; }
        #typing { color: #666; font-style: italic; margin-bottom: 5px; min-height: 20px; }
    </style>
</head>
<body>
    <h2>mesNation Chat (test)</h2>
    <input id="chatId" value="11" placeholder="chat id"><br>
    <input id="senderId" value="1" placeholder="sender id"><br>
    <input id="text" placeholder="Сообщение..."><button onclick="send()">Отправить</button><br><br>
    <input type="file" id="fileInput"><button onclick="uploadFile()">Отправить файл</button>
    <hr>
    <div id="typing"></div>
    <div id="messages"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const chatId = document.getElementById('chatId').value;
        const senderId = document.getElementById('senderId').value;
        const socket = io({ auth: { userId: parseInt(senderId) } });
        socket.emit('join_chat', chatId);

        let typingTimer = null;

        document.getElementById('text').addEventListener('input', () => {
            socket.emit('typing', { chatId, userId: parseInt(senderId) });
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                socket.emit('stop_typing', { chatId, userId: parseInt(senderId) });
            }, 2000);
        });

        socket.on('new_message', (msg) => {
            const div = document.getElementById('messages');
            div.innerHTML += `<div class="msg"><span>User ${msg.sender_id}:</span> ${msg.text || ''} ${msg.file_url ? `<a href="${msg.file_url}">${msg.file_name}</a>` : ''}</div>`;
        });

        socket.on('user_typing', (data) => {
            if (data.chatId === chatId && data.userId !== parseInt(senderId)) {
                document.getElementById('typing').textContent = data.userName + ' печатает...';
            }
        });

        socket.on('user_stop_typing', (data) => {
            if (data.chatId === chatId) {
                document.getElementById('typing').textContent = '';
            }
        });

        function send() {
            const text = document.getElementById('text').value;
            clearTimeout(typingTimer);
            socket.emit('stop_typing', { chatId, userId: parseInt(senderId) });
            socket.emit('send_message', { chatId, senderId: parseInt(senderId), text });
            document.getElementById('text').value = '';
        }

        async function uploadFile() {
            const formData = new FormData();
            formData.append('file', document.getElementById('fileInput').files[0]);
            formData.append('chatId', chatId);
            formData.append('senderId', senderId);
            const token = prompt('Введите токен:');
            await fetch('/api/upload', { 
                method: 'POST', 
                headers: { Authorization: `Bearer ${token}` },
                body: formData 
            });
        }
    </script>
</body>
</html>
